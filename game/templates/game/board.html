{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkora | AI Chess</title>
    <link rel="icon" type="image/jpeg" href="{% static 'game/favicon.jpeg' %}">

    <script>
        window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>

    <link rel="stylesheet" href="{% static 'game/css/board.css' %}">

    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>

    <script>
        (function () {
            const VALID_THEMES = ['classic', 'dark', 'green', 'blue'];
            let saved = 'classic';
            try { saved = localStorage.getItem('chessBoardTheme') || 'classic'; } catch (e) {}
            if (!VALID_THEMES.includes(saved)) saved = 'classic';
            document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>
</head>

<body>

<!-- ================= WELCOME ================= -->
<div class="promo-overlay active" id="welcomeOverlay">
    <div class="promo-dialog">

        <div class="promo-title">Checkora</div>

        <input type="text" id="whiteNameInput" placeholder="White Player Name">
        <input type="text" id="blackNameInput" placeholder="Black Player Name">

        <button id="welcomePvPBtn">Pass & Play (PvP)</button>
        <button id="welcomeAIBtn">Play vs AI</button>

    </div>
</div>

<!-- ================= HEADER ================= -->
<div class="header">
    <h1>
        Checkora
        <span class="badge" id="modeBadge">PVP</span>
    </h1>
</div>

<!-- ================= CAPTURED ================= -->
<div class="card-title">Captured by <span id="whiteCapturedName">White</span></div>
<div class="card-title">Captured by <span id="blackCapturedName">Black</span></div>

<!-- ================= TURN ================= -->
<div class="turn-badge white" id="turnBadge">
    <span id="turnBadgeText">White</span>'s Turn
</div>

<!-- ================= CLOCKS ================= -->
<div id="whiteClock"><span id="whiteNameLabel">WHITE</span></div>
<div id="blackClock"><span id="blackNameLabel">BLACK</span></div>

<!-- ================= CONTROLS ================= -->
<button id="pauseBtn">Pause</button>

<!-- ⚠️ FIXED: ONLY ONE resign button -->
<button id="resignBtn" style="background:#333;color:#fff;">Resign</button>

<!-- ================= GAME SCRIPT ================= -->
<script>
(() => {
'use strict';

/* ================= STATE ================= */
let board = [];
let turn = 'white';

let whiteName = 'White';
let blackName = 'Black';

/* ================= HELPERS ================= */
const cap = n => n ? n.charAt(0).toUpperCase() + n.slice(1).toLowerCase() : '';

/* ================= TURN UI ================= */
function updateTurn() {
    const turnName = turn === 'white' ? whiteName : blackName;

    document.getElementById('turnBadgeText').textContent = cap(turnName);
    document.getElementById('turnBadge').textContent = `${cap(turnName)}'s Turn`;
}

/* ================= NEW GAME ================= */
async function startNewGame(mode) {

    whiteName = document.getElementById('whiteNameInput').value.trim() || 'White';
    blackName = document.getElementById('blackNameInput').value.trim() || 'Black';

    const data = await fetch('/api/new-game/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            mode,
            white_name: whiteName,
            black_name: blackName
        })
    }).then(r => r.json());

    board = data.board;
    turn = data.current_turn;

    document.getElementById('whiteNameLabel').textContent = whiteName.toUpperCase();
    document.getElementById('blackNameLabel').textContent = blackName.toUpperCase();

    document.getElementById('whiteCapturedName').textContent = cap(whiteName);
    document.getElementById('blackCapturedName').textContent = cap(blackName);

    document.getElementById('modeBadge').textContent = mode === 'ai' ? 'VS AI' : 'PVP';

    updateTurn();
}

/* ================= EVENTS ================= */
document.getElementById('welcomePvPBtn').onclick = () => startNewGame('pvp');
document.getElementById('welcomeAIBtn').onclick = () => startNewGame('ai');

})();
</script>

</body>
</html>
